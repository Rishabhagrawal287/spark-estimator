<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Spark Estimator"/>
<meta name="theme-color" content="#0f172a"/>
<title>Spark Estimator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overscroll-behavior:none}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#e8edf3;color:#0f172a}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}
.scroll-y{overflow-y:auto;-webkit-overflow-scrolling:touch}
:root{
  --navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
  --acc:#1d4ed8;--acc2:#3b82f6;--acc3:#93c5fd;
  --sur:#ffffff;--sur2:#f8fafc;
  --bdr:#e2e8f0;--bdr2:#cbd5e1;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;
  --grn:#10b981;--yel:#f59e0b;--red:#ef4444;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shf:0 8px 32px rgba(0,0,0,.16),0 2px 8px rgba(0,0,0,.08);
}
.shell{max-width:480px;margin:0 auto;min-height:100vh;background:var(--sur2);position:relative}
@media(min-width:481px){body{background:#dde4ed}.shell{box-shadow:0 0 60px rgba(15,23,42,.14),0 0 0 1px var(--bdr)}}
#hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;background:linear-gradient(165deg,#16213e 0%,#0f172a 55%,#0a1224 100%)}
#hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.4),transparent)}
#hdr.shrunk{box-shadow:var(--shf)}
#hdr.shrunk #hexp{max-height:0;opacity:0;overflow:hidden}
#hdr.shrunk #hcmp{opacity:1;pointer-events:auto}
#hexp{max-height:200px;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1),opacity .2s}
#hcmp{opacity:0;pointer-events:none;transition:opacity .2s}
.tdisp{font-family:'DM Mono',monospace;font-weight:500;letter-spacing:-.02em;transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.tdisp.bump{transform:scale(1.06);color:#93c5fd}
.pring{transform:rotate(-90deg)}
.pfill{transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);stroke-linecap:round}
.stab{flex-shrink:0;padding:9px 13px;font-size:12px;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer;transition:color .2s,border-color .2s}
.stab.on{color:var(--acc2);border-bottom-color:var(--acc2)}
.tbdg{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;margin-left:4px;border-radius:9px;font-size:10px;font-weight:700;background:var(--acc);color:#fff}
.gc{background:var(--sur);border-radius:16px;box-shadow:var(--sh);overflow:hidden;margin-bottom:10px;border:1px solid var(--bdr);transition:box-shadow .2s,border-color .2s}
.gc.done{border-color:var(--acc3);box-shadow:0 0 0 1px var(--acc3),var(--sh)}
.gc.nact{border-color:#86efac;box-shadow:0 0 0 1px #86efac,var(--sh)}
.gh{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;user-select:none;-webkit-user-select:none;background:none;border:none;width:100%;text-align:left;gap:10px}
.gchev{transition:transform .25s cubic-bezier(.4,0,.2,1);color:var(--t3);flex-shrink:0}
.gc.open .gchev{transform:rotate(180deg)}
.gbody{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.gc.open .gbody{max-height:4000px}
.gitems{padding:0 10px 10px}
.iw{position:relative;margin-bottom:6px;border-radius:12px;overflow:hidden}
.ibg-add{position:absolute;inset:0;background:linear-gradient(90deg,#1d4ed8,#3b82f6);display:flex;align-items:center;padding-left:18px;border-radius:12px}
.ibg-clr{position:absolute;inset:0;background:linear-gradient(270deg,#ef4444,#f87171);display:flex;align-items:center;justify-content:flex-end;padding-right:18px;border-radius:12px}
.ic{position:relative;background:var(--sur2);border-radius:12px;padding:11px 13px;border:1px solid var(--bdr);cursor:pointer;transition:background .2s,border-color .2s;touch-action:pan-y;z-index:1}
.ic.chk{background:#eff6ff;border-color:var(--acc3)}
.qrow{max-height:0;overflow:hidden;opacity:0;transition:max-height .28s cubic-bezier(.4,0,.2,1),opacity .2s}
.ic.chk .qrow{max-height:200px;opacity:1}
.qi{width:72px;padding:6px 8px;font-size:16px;font-family:'DM Mono',monospace;font-weight:500;border:1.5px solid var(--bdr2);border-radius:8px;background:#fff;color:var(--t1);text-align:right;outline:none;transition:border-color .2s,box-shadow .2s}
.qi:focus{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.cchip{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;border-radius:6px;background:#eff6ff;border:1px solid #dbeafe;font-size:11px;font-family:'DM Mono',monospace;color:var(--acc);cursor:pointer;transition:background .15s}
.cchip:active{background:#dbeafe}
.ltot{font-family:'DM Mono',monospace;font-weight:600;font-size:14px;color:var(--acc);min-width:58px;text-align:right;flex-shrink:0}
.ltot.z{color:var(--t3)}
.rtbar{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--sur2);border-bottom:1px solid var(--bdr);padding:0 4px;position:sticky;top:0;z-index:10;margin-bottom:2px}
.rtbar::-webkit-scrollbar{display:none}
.rt{flex-shrink:0;padding:8px 13px;font-size:12px;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none}
.rt.on{color:var(--acc2);border-bottom-color:var(--acc2)}
.rtadd{flex-shrink:0;padding:8px 11px;font-size:17px;color:var(--acc2);background:none;border:none;cursor:pointer}
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sur);border-top:1px solid var(--bdr);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 24px rgba(0,0,0,.08)}
@keyframes fpIn{0%{opacity:0;transform:scale(.72) translateY(-12px);clip-path:inset(0 100% 100% 0 round 16px)}60%{opacity:1;transform:scale(1.02) translateY(2px);clip-path:inset(0 0% 0% 0 round 16px)}100%{opacity:1;transform:scale(1) translateY(0);clip-path:inset(0 0% 0% 0 round 16px)}}
@keyframes fpOut{0%{opacity:1;transform:scale(1);clip-path:inset(0 0% 0% 0 round 16px)}100%{opacity:0;transform:scale(.78) translateY(-10px);clip-path:inset(0 90% 90% 0 round 20px)}}
@keyframes stg{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
#pov{position:fixed;inset:0;z-index:299;opacity:0;pointer-events:none;background:rgba(0,0,0,0);transition:background .3s}
#pov.on{opacity:1;pointer-events:auto;background:rgba(0,0,0,.18)}
#pov.off{pointer-events:none;background:rgba(0,0,0,0)}
#sp{position:fixed;top:56px;left:12px;width:290px;max-height:calc(100vh - 80px);background:#0f172a;border:1px solid rgba(59,130,246,.25);border-radius:18px;z-index:300;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 0 1px rgba(59,130,246,.1),0 8px 32px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06);transform-origin:top left;opacity:0;pointer-events:none;clip-path:inset(0 100% 100% 0 round 18px)}
#sp::before{content:'';position:absolute;top:0;left:16px;right:16px;height:2px;background:linear-gradient(90deg,transparent,#3b82f6,#60a5fa,transparent);border-radius:1px;z-index:2}
#sp.on{pointer-events:auto;animation:fpIn .55s cubic-bezier(.34,1.3,.64,1) forwards}
#sp.off{animation:fpOut .32s cubic-bezier(.4,0,.8,.5) forwards}
#plist>div{animation:none}
#sp.on #plist>div:nth-child(1){animation:stg .28s ease .18s both}
#sp.on #plist>div:nth-child(2){animation:stg .28s ease .24s both}
#sp.on #plist>div:nth-child(3){animation:stg .28s ease .30s both}
#sp.on #plist>div:nth-child(n+4){animation:stg .28s ease .38s both}
#mwrap{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
#mwrap.on{opacity:1;pointer-events:auto}
#mbg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
#mbox{position:relative;background:#fff;border-radius:20px;padding:24px;width:100%;max-width:360px;box-shadow:var(--shf);transform:scale(.95) translateY(8px);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
#mwrap.on #mbox{transform:scale(1) translateY(0)}
.bsheet{position:fixed;inset:0;z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.bsheet.on{opacity:1;pointer-events:auto}
.bsbg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px)}
.bsbox{position:relative;width:100%;background:#fff;border-radius:24px 24px 0 0;padding:24px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));box-shadow:var(--shf);transform:translateY(40px);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto}
.bsheet.on .bsbox{transform:translateY(0)}
.pthumb{position:relative;width:68px;height:68px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1.5px solid var(--bdr)}
.pthumb img{width:100%;height:100%;object-fit:cover}
.prm{position:absolute;top:-3px;right:-3px;width:18px;height:18px;background:#ef4444;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;cursor:pointer}
.btn-p{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--acc);color:#fff;font-size:14px;font-weight:700;padding:13px 20px;border-radius:12px;border:none;cursor:pointer;width:100%;transition:background .15s,transform .1s}
.btn-p:active{background:#1e40af;transform:scale(.98)}
.btn-s{display:flex;align-items:center;justify-content:center;gap:6px;background:#fff;color:var(--acc);font-size:14px;font-weight:700;padding:13px 20px;border-radius:12px;border:2px solid var(--acc);cursor:pointer;width:100%;transition:background .15s,transform .1s}
.btn-s:active{background:#eff6ff;transform:scale(.98)}
.pill{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 16px}
.yrbdg{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;background:#fef3c7;border:1px solid #fde68a;font-size:10px;font-weight:600;color:#92400e}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.nabtn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--sur2);cursor:pointer;width:100%;text-align:left;transition:all .2s;margin-bottom:8px}
.nabtn.act{border-color:#10b981;background:#f0fdf4}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="pov" onclick="closePanel()"></div>
<div id="sp">
  <div style="padding:15px 15px 11px;border-bottom:1px solid rgba(255,255,255,.07)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:9px;font-weight:800;letter-spacing:.16em;color:#3b82f6;text-transform:uppercase;margin-bottom:3px">Spark Homes</div>
        <div style="font-size:16px;font-weight:800;color:#fff;letter-spacing:-.02em">My Estimates</div>
      </div>
      <button onclick="closePanel()" style="width:27px;height:27px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;cursor:pointer;color:rgba(255,255,255,.5);flex-shrink:0">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div id="plist" class="scroll-y" style="flex:1;min-height:0;overflow-y:auto;max-height:340px"></div>
  <div style="padding:9px 11px 11px;border-top:1px solid rgba(255,255,255,.06)">
    <button onclick="newProject()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 14px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:11px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Estimate
    </button>
  </div>
</div>
<div id="mwrap">
  <div id="mbg" onclick="closeModal()"></div>
  <div id="mbox">
    <h3 id="mtitle" style="font-size:17px;font-weight:700;color:var(--t1);margin:0 0 14px"></h3>
    <input id="minp" type="text" style="width:100%;padding:11px 13px;font-size:16px;border:1.5px solid var(--bdr2);border-radius:10px;outline:none;font-family:inherit;color:var(--t1)"/>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn-s" onclick="closeModal()" style="font-size:14px">Cancel</button>
      <button class="btn-p" onclick="confirmModal()" style="font-size:14px">Save</button>
    </div>
  </div>
</div>
<div id="ssheet" class="bsheet">
  <div class="bsbg" onclick="closeSettings()"></div>
  <div class="bsbox">
    <div class="pill"></div>
    <h2 style="font-size:18px;font-weight:800;color:var(--t1);margin:0 0 4px">Settings</h2>
    <p style="font-size:13px;color:var(--t3);margin:0 0 16px">Price schedule & agent info</p>
    <h3 style="font-size:11px;font-weight:700;color:var(--t2);margin:0 0 6px;text-transform:uppercase;letter-spacing:.06em">Price Schedule</h3>
    <div id="pstatus" style="padding:9px 13px;background:var(--sur2);border-radius:10px;font-size:12px;color:var(--t3);margin-bottom:10px;border:1px solid var(--bdr)">Using default prices from Pricing_List.csv</div>
    <label style="display:block;cursor:pointer;margin-bottom:8px">
      <div class="btn-p" style="font-size:13px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Updated Prices (CSV)
      </div>
      <input type="file" accept=".csv" id="csvinp" style="display:none" onchange="handleCsv(this)"/>
    </label>
    <button id="rstprice" onclick="resetPrices()" style="display:none;width:100%;padding:10px;border-radius:10px;border:1.5px solid #fecaca;background:none;color:#ef4444;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px">Reset to Default Prices</button>
    <hr style="border:none;border-top:1px solid var(--bdr);margin:14px 0"/>
    <h3 style="font-size:11px;font-weight:700;color:var(--t2);margin:0 0 8px;text-transform:uppercase;letter-spacing:.06em">Agent Info</h3>
    <input id="agentinp" type="text" placeholder="Your name (shown on exports)" style="width:100%;padding:10px 13px;font-size:16px;border:1.5px solid var(--bdr2);border-radius:10px;outline:none;font-family:inherit;color:var(--t1);margin-bottom:10px" oninput="ST.agent=this.value;sched()"/>
    <button class="btn-p" onclick="closeSettings()" style="font-size:14px">Done</button>
  </div>
</div>
<div id="cesheet" class="bsheet">
  <div class="bsbg" onclick="closeCE()"></div>
  <div class="bsbox" style="max-height:50vh">
    <div class="pill"></div>
    <h3 id="cetitle" style="font-size:16px;font-weight:700;color:var(--t1);margin:0 0 3px"></h3>
    <p id="ceunit" style="font-size:12px;color:var(--t3);margin:0 0 14px"></p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span style="font-size:22px;font-weight:700;color:var(--t2)">$</span>
      <input id="ceinp" type="number" step="0.01" min="0" inputmode="decimal" style="flex:1;padding:12px 13px;font-size:20px;font-family:'DM Mono',monospace;font-weight:600;border:2px solid var(--acc2);border-radius:12px;outline:none;color:var(--t1)"/>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-s" onclick="closeCE()" style="font-size:14px">Cancel</button>
      <button class="btn-p" onclick="saveCE()" style="font-size:14px">Update Price</button>
    </div>
    <button id="cerstbtn" onclick="resetCE()" style="width:100%;margin-top:8px;padding:9px;background:none;border:none;font-size:12px;color:var(--t3);cursor:pointer">Reset to default</button>
  </div>
</div>
<div id="toast"></div>
<input type="file" id="photoinp" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)"/>
<div id="app"></div>
<script>
'use strict';
const IC={
  menu:`<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>`,
  cog:`<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  exp:`<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>`,
  pen:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,

function secTot(sec){

    if(sec.multi==='bathrooms'){sec.groups.forEach(gid=>{tot++;if(ST.bath.inst.some(b=>grpDone(gid,b.id)))chk++;});}

    else if(sec.multi==='living'){ST.liv.inst.forEach(la=>{LA_GRPS.forEach(g=>{tot++;if(grpDone(g.id,la.id))chk++;});});}

}

}

function updTot(){

    if(st>0){const txt=fmt$(st).replace('$','');if(bdg)bdg.textContent=txt;else{bdg=document.createElement('span');bdg.className='tbdg';bdg.textContent=txt;tab.appendChild(bdg);}}

function updProg(){
  const pg=calcProg();const pct=pg.tot?Math.round(pg.chk/pg.tot*100):0;
  const C=2*Math.PI*16;const off=C-(pct/100)*C;
  const ring=document.querySelector('.pfill');if(ring){ring.style.strokeDashoffset=off;ring.setAttribute('stroke',pct===100?'#10b981':'#3b82f6');}
  const lbl=document.querySelector('#hexp div:last-child');if(lbl)lbl.textContent=`${pg.chk} of ${pg.tot} groups reviewed`;

function switchSec(i){

function doExport(){
  const tot=calcTotal();if(!tot){toast('No items checked yet');return;}
  toast('Preparing export…');setTimeout(()=>buildExport(),200);

function buildExport(){
  try{
    const wb=XLSXStyle.utils.book_new();
    const ws={};
    const cell=(r,c,v,s)=>{const addr=XLSXStyle.utils.encode_cell({r,c});ws[addr]={v,s:s||{}};};
    const hdrS={fill:{fgColor:{rgb:'0F172A'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:13},alignment:{horizontal:'center'}};
    const secS={fill:{fgColor:{rgb:'1D4ED8'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:12}};
    const subS={fill:{fgColor:{rgb:'EFF6FF'}},font:{bold:true,color:{rgb:'1D4ED8'},sz:11},alignment:{horizontal:'right'}};
    const totS={fill:{fgColor:{rgb:'0F172A'}},font:{bold:true,color:{rgb:'93C5FD'},sz:14},alignment:{horizontal:'right'}};
    const lblS={font:{bold:true,color:{rgb:'475569'},sz:10}};
    const valS={font:{color:{rgb:'0F172A'},sz:11}};
    const numS={font:{color:{rgb:'1D4ED8'},sz:11},numFmt:'$#,##0',alignment:{horizontal:'right'}};
    let row=0;
    cell(row,0,`SPARK HOMES — REPAIR ESTIMATE`,hdrS);cell(row,1,'',hdrS);cell(row,2,'',hdrS);cell(row,3,'',hdrS);cell(row,4,'',hdrS);row++;
    cell(row,0,`Property: ${ST.pname}`,{font:{bold:true,sz:11}});cell(row,3,`Agent: ${ST.agent||'—'}`,{font:{sz:10,color:{rgb:'475569'}}});cell(row,4,`Date: ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`,{font:{sz:10,color:{rgb:'475569'}}});row++;
    cell(row,0,'Repair Item',lblS);cell(row,1,'Unit',lblS);cell(row,2,'Unit Cost',lblS);cell(row,3,'Qty',lblS);cell(row,4,'Total',lblS);row++;
    let grand=0;
    SECS.forEach(sec=>{
      let secTotal=0;const secRows=[];
      const addRows=(grps,pfx)=>{grps.forEach(g=>{const gl=g;(gl.ids||[]).forEach(iid=>{const sk=pfx?`${pfx}:${iid}`:iid;const d=ITEMS[iid];if(!d)return;const s=ST.items[sk];if(!s||!s.chk)return;const q=parseFloat(s.qty)||0;if(!q)return;const t=lineTot(d,sk);secRows.push([d.name,d.unit,getC(d),q,t]);secTotal+=t;});});};
      if(sec.multi==='bathrooms'){sec.groups.forEach(gid=>{ST.bath.inst.forEach(b=>{const gl=GROUPS[gid];addRows([{...gl,label:`${b.name}: ${gl.label}`}],b.id);});});}
      else if(sec.multi==='bedrooms'){ST.bed.inst.forEach(b=>{addRows(BD_GRPS.map(g=>({...g,label:`${b.name}: ${g.label}`})),b.id);});}
      else if(sec.multi==='living'){ST.liv.inst.forEach(la=>{addRows(LA_GRPS.map(g=>({...g,label:`${la.name}: ${g.label}`})),la.id);});}
      else{addRows(sec.groups.map(g=>GROUPS[g]),null);(sec.misc||[]).forEach(iid=>{const sk=iid;const d=ITEMS[iid];if(!d)return;const s=ST.items[sk];if(!s||!s.chk)return;const q=parseFloat(s.qty)||0;if(!q)return;const t=lineTot(d,sk);secRows.push([d.name,d.unit,getC(d),q,t]);secTotal+=t;});}
      if(!secRows.length)return;
      cell(row,0,sec.name,secS);[1,2,3,4].forEach(c=>cell(row,c,'',secS));row++;
      secRows.forEach(([name,unit,uc,qty,t])=>{
        cell(row,0,name,valS);cell(row,1,unit,{font:{color:{rgb:'94a3b8'},sz:10}});
        cell(row,2,uc,{...numS,numFmt:'$#,##0.00'});cell(row,3,qty,{font:{sz:11},alignment:{horizontal:'center'}});
        cell(row,4,t,numS);row++;
      });
      cell(row,0,'',{});[1,2,3].forEach(c=>cell(row,c,'',{}));
      cell(row,4,secTotal,subS);row++;grand+=secTotal;
    });
    row++;
    cell(row,0,'GRAND TOTAL',totS);[1,2,3].forEach(c=>cell(row,c,'',totS));cell(row,4,grand,{...totS,numFmt:'$#,##0'});
    ws['!ref']=XLSXStyle.utils.encode_range({s:{r:0,c:0},e:{r:row,c:4}});
    ws['!cols']=[{wch:40},{wch:16},{wch:12},{wch:8},{wch:14}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:4}},{s:{r:row,c:0},e:{r:row,c:3}}];
    XLSXStyle.utils.book_append_sheet(wb,ws,'Repair Estimate');
    const fname=`Repair-Estimate-${ST.pname.replace(/[^a-zA-Z0-9]/g,'-')}-${new Date().toISOString().slice(0,10)}`;
    const allPhotos=Object.entries(ST.photos);
    if(allPhotos.length){
      const zip=new JSZip();
      const wbout=XLSXStyle.write(wb,{bookType:'xlsx',type:'base64'});
      zip.file(`${fname}.xlsx`,wbout,{base64:true});
      const pf=zip.folder('photos');
      allPhotos.forEach(([sk,photos])=>{photos.forEach((p,i)=>{const ext=p.name.split('.').pop()||'jpg';const b64=p.url.split(',')[1];pf.file(`${sk.replace(/:/g,'-')}_${i+1}.${ext}`,b64,{base64:true});});});
      zip.generateAsync({type:'blob'}).then(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${fname}.zip`;a.click();toast('ZIP downloaded!');});
    } else {
      XLSXStyle.writeFile(wb,`${fname}.xlsx`);toast('Excel downloaded!');
    }
  }catch(e){console.error(e);toast('Export error — check console');}
}
function renderDeal(){

function renderDealResults(){
  const tot=calcTotal();const arv=parseFloat(ST.arv)||0;const pur=parseFloat(ST.purchase)||0;
  const maxOffer=arv>0?Math.max(0,arv*0.70-tot):0;
  const costBasis=pur+tot;const profit=arv>0?arv-costBasis:0;
  const margin=arv>0?(profit/arv*100):0;
  const score=margin>20?['🟢','STRONG DEAL','d1fae5','065f46']:margin>10?['🟡','MARGINAL','fef3c7','92400e']:['🔴','PASS','fee2e2','991b1b'];
  return `<div style="background:var(--sur2);border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--bdr)">

        <span style="font-family:'DM Mono',monospace;font-weight:600;font-size:13px;color:var(--acc)">${fmt$(tot)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;color:var(--t2)">Max Offer (70% Rule)</span>
        <span style="font-family:'DM Mono',monospace;font-weight:700;font-size:13px;color:${arv>0?'var(--t1)':'var(--t3)'}">${arv>0?fmt$(maxOffer):'Enter ARV'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;color:var(--t2)">Total Cost Basis</span>
        <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--t2)">${pur>0?fmt$(costBasis):'—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:12px;font-weight:700;color:var(--t1)">Estimated Profit</span>
        <span style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:${profit>0?'#059669':profit<0?'#ef4444':'var(--t3)'}">${arv>0&&pur>0?fmt$(profit):'—'}</span>
      </div>
    </div>
    ${arv>0&&pur>0?`<div style="background:#${score[2]};border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:16px;font-weight:800;color:#${score[3]}">${score[0]} ${score[1]}</div>
        <div style="font-size:12px;color:#${score[3]};margin-top:2px">Profit margin: ${margin.toFixed(1)}%  ·  Max Offer: ${fmt$(maxOffer)}</div>
      </div>
    </div>`:'<div style="padding:12px;background:var(--sur2);border-radius:12px;text-align:center;font-size:12px;color:var(--t3)">Enter ARV and Purchase Price to see deal score</div>'}`;
}
